<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="panel" id="panel-course" data-step-panel="course" th:fragment="coursePanel" style="background:#fff;padding:0 0 14px;">
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0 10px;border-bottom:1px solid #e5e7eb;">
        <h2 style="margin:0;font-size:12px;font-weight:700;color:#222;">Course Selection</h2>
        <div style="width:26px;height:26px;border-radius:3px;background:#25b04a;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;line-height:1;">▶</div>
    </div>

    <div style="margin:8px 0 12px;color:#ff1616;font-size:17px;line-height:1.2;font-weight:400;">
        Please let the page load completely, before proceeding with course selection.
    </div>

    <input type="hidden" name="course" data-course-value th:value="${student.course}">

    <div style="display:block;max-width:320px;">
        <label for="courseSelect" style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Course<span style="color:#ff0000;">*</span></label>
        <select id="courseSelect" name="courseChoiceDisplay" data-course-select required style="width:285px;max-width:100%;height:25px;padding:2px 10px;border:1px solid #b7b7b7;background:#fff;font-size:12px;color:#333;border-radius:2px;outline:none;">
            <option value="">Please Select</option>
            <option th:each="courseItem : ${availableCourses}"
                    th:value="${courseItem.code}"
                    th:text="${courseItem.name}"
                    th:selected="${student.course == courseItem.code}">
                Course Name
            </option>
        </select>
    </div>

    <button type="submit" class="course-save" style="margin-top:28px;background:#9acd32;color:#fff;border:0;border-radius:2px;padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer;min-height:30px;">
        Save &amp; Next
    </button>

    <table style="width:100%;border-collapse:collapse;margin-top:30px;font-size:12px;">
        <thead>
        <tr>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:left;">Course</th>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:center;">Application No</th>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:center;">Application Status</th>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:center;">Paymode</th>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:center;">Action</th>
            <th style="background:#38ceb0;color:#fff;font-weight:700;padding:7px 6px;border:1px solid #dce7ea;text-align:center;">Payment Receipt</th>
        </tr>
        </thead>
        <tbody>
        <tr data-course-row th:style="${student.course != null and !#strings.isEmpty(student.course) ? '' : 'display:none;'}">
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:left;color:#223042;background:#fff;" data-course-cell="name" th:text="${selectedCourseLabel != null ? selectedCourseLabel : (student.course != null ? student.course : '')}">Course</td>
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:center;color:#223042;background:#fff;" data-course-cell="appNo" th:text="${student.registrationNo != null ? student.registrationNo : 'N/A'}">N/A</td>
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:center;background:#fff;"><span style="color:#ff1616;font-weight:400;" data-course-cell="status" th:text="${student.admissionStatus != null ? student.admissionStatus : 'NOT-CONFIRM'}">NOT-CONFIRM</span></td>
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:center;color:#ff1616;background:#fff;" data-course-cell="paymode">NA</td>
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:center;background:#fff;">
                <button type="button" data-course-proceed style="background:#ffbe15;color:#1d1d1d;border:0;border-radius:2px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;">Proceed</button>
            </td>
            <td style="padding:8px 6px;border:1px solid #dfe6eb;text-align:center;background:#fff;" data-course-cell="receipt">&nbsp;</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
