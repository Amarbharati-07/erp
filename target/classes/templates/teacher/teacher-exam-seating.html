<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating - AI Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/student/student-common.css">
    <link rel="stylesheet" href="/css/student/student-dashboard-layout.css">
    <link rel="stylesheet" href="/css/student/student-portal-data.css">
    <link rel="stylesheet" href="/css/teacher/teacher-portal.css">
</head>
<body class="student-layout-page teacher-layout-page">
<div class="student-shell">
    <div th:replace="~{teacher/components/sidebar :: sidebar(activePage='exams')}"></div>

    <div class="main-content">
        <div th:replace="~{teacher/components/topbar :: topbar(title='Exam Seating', subtitle='View the auto-generated exam seating plan for the selected class.')}"></div>

        <main class="portal-page-body teacher-page-grid">
            <section class="portal-hero-banner">
                <div class="portal-hero-copy">
                    <span class="portal-hero-kicker"><i class="fa-solid fa-chair"></i> Seating</span>
                    <h2 class="portal-hero-title" th:text="${exam.title}">Exam title</h2>
                    <p class="portal-hero-subtitle" th:text="${exam.seatingInfo}">Seating info</p>
                </div>
            </section>

            <section class="teacher-panel">
                <div class="teacher-panel-head">
                    <div>
                        <h2 class="teacher-panel-title">Seat Allocation</h2>
                        <p class="teacher-panel-subtitle">Generated from the class roster using the roll number order.</p>
                    </div>
                </div>

                <div class="teacher-grid-three">
                    <article class="teacher-kpi-card" th:each="seat : ${seatViews}">
                        <p class="teacher-kpi-label" th:text="${seat.seatLabel}">Seat</p>
                        <h3 class="teacher-kpi-value" th:text="${seat.student.name}">Student</h3>
                        <p class="teacher-kpi-meta" th:text="${seat.rollNo}">Roll no</p>
                    </article>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="/js/student/student-dashboard-layout.js"></script>
</body>
</html>
