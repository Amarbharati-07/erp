<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="chatbot(role, displayName, collegeName)"
     class="scms-chatbot"
     th:attr="data-role=${role},
              data-display-name=${displayName},
              data-college-name=${collegeName},
              data-message-endpoint='/api/chatbot/message',
              data-context-endpoint='/api/chatbot/context'">
    <style>
        .scms-chatbot {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 2500;
            font-family: "Jost", "Segoe UI", sans-serif;
        }
        .scms-chatbot-launcher {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 42px;
            padding: 7px 14px 7px 9px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(247, 248, 251, 0.98) 100%);
            color: #0f172a;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 24px rgba(6, 10, 20, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            cursor: pointer;
            text-align: left;
        }
        .scms-chatbot-launcher-mark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: relative;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1), 0 0 0 1px rgba(15, 23, 42, 0.06);
            flex-shrink: 0;
        }
        .scms-chatbot-launcher-dot {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }
        .scms-chatbot-launcher-dot--blue {
            width: 10px;
            height: 10px;
            left: 7px;
            top: 9px;
            background: #2563eb;
        }
        .scms-chatbot-launcher-dot--orange {
            width: 6px;
            height: 6px;
            left: 18px;
            top: 7px;
            background: #f59e0b;
        }
        .scms-chatbot-launcher-copy strong {
            font-size: 0.92rem;
            line-height: 1.1;
            letter-spacing: 0.01em;
            font-weight: 700;
        }
        .scms-chatbot-launcher-copy small {
            display: none;
        }
        .scms-chatbot-shell {
            position: fixed;
            inset: 0;
            display: none;
            justify-items: end;
            align-items: end;
            pointer-events: none;
        }
        .scms-chatbot.is-open .scms-chatbot-shell {
            display: grid;
            pointer-events: auto;
        }
        .scms-chatbot-shell[hidden] {
            display: none !important;
        }
    </style>
    <button class="scms-chatbot-launcher" type="button" aria-expanded="false" aria-label="Open chatbotai">
        <span class="scms-chatbot-launcher-mark" aria-hidden="true">
            <span class="scms-chatbot-launcher-dot scms-chatbot-launcher-dot--blue"></span>
            <span class="scms-chatbot-launcher-dot scms-chatbot-launcher-dot--orange"></span>
        </span>
        <span class="scms-chatbot-launcher-copy">
            <strong>CHATBOT</strong>
        </span>
    </button>

    <div class="scms-chatbot-shell" hidden>
        <button class="scms-chatbot-backdrop" type="button" aria-label="Close assistant"></button>

        <section class="scms-chatbot-panel" role="dialog" aria-modal="true" aria-label="Campus Assistant">
            <header class="scms-chatbot-header">
                <div class="scms-chatbot-header-copy">
                    <span class="scms-chatbot-kicker" th:text="${role} == 'TEACHER' ? 'Teacher console' : 'Student console'">Console</span>
                    <h2 class="scms-chatbot-title">Campus Assistant</h2>
                    <p class="scms-chatbot-subtitle" th:text="${collegeName}">College</p>
                </div>
                <div class="scms-chatbot-header-actions">
                    <div class="scms-chatbot-status">
                        <span class="scms-chatbot-status-dot"></span>
                        <span>Live</span>
                    </div>
                    <button class="scms-chatbot-close" type="button" aria-label="Close assistant">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </header>

            <div class="scms-chatbot-body">
                <div class="scms-chatbot-intro">
                    <span class="scms-chatbot-intro-label">Quick help</span>
                    <p>Ask about timetable, fees, subjects, assignments, or profile details.</p>
                </div>
                <div class="scms-chatbot-messages" aria-live="polite" aria-relevant="additions"></div>
                <div class="scms-chatbot-suggestions" aria-label="Quick prompts"></div>
            </div>

            <form class="scms-chatbot-form" autocomplete="off">
                <label class="sr-only" for="scmsChatInput">Ask the assistant</label>
                <textarea id="scmsChatInput" class="scms-chatbot-input" rows="1" placeholder="Ask about timetable, fees, students..." maxlength="1000"></textarea>
                <button type="submit" class="scms-chatbot-send">
                    <i class="fa-solid fa-paper-plane"></i>
                    Send
                </button>
            </form>
        </section>
    </div>
</div>
</body>
</html>
