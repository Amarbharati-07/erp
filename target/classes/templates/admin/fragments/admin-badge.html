<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="adminBadge(adminName, collegeName)">
    <div class="admin-tag">
        <div class="admin-avatar" aria-hidden="true">
            <img th:if="${collegeLogoPath != null and !#strings.isEmpty(collegeLogoPath)}"
                 th:src="${collegeLogoPath}"
                 alt="College logo"
                 style="width:100%;height:100%;object-fit:cover;">
            <i th:unless="${collegeLogoPath != null and !#strings.isEmpty(collegeLogoPath)}" class="fa fa-building-columns"></i>
        </div>
        <div class="admin-copy">
            <div class="admin-name" th:text="${adminName} ?: 'Admin'">Admin</div>
        </div>
    </div>
</th:block>
</body>
</html>
