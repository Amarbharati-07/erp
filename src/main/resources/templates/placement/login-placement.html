<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement TPO Login - AI Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#18160f,#2a2419 54%,#f6f0e4);color:#18160f}
        .card{width:min(520px,calc(100vw - 32px));border-radius:28px;background:rgba(255,255,255,.94);box-shadow:0 24px 80px rgba(0,0,0,.28);border:1px solid rgba(200,146,42,.18);padding:28px}
        .eyebrow{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;background:rgba(200,146,42,.12);color:#8a5c12;font-weight:700;font-size:12px}
        h1{font-family:'Instrument Serif',Georgia,serif;font-size:42px;margin:14px 0 8px}
        p{margin:0 0 18px;color:#685f53}
        .msg{border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:600}
        .msg.err{background:rgba(208,63,63,.10);color:#9f3939;border:1px solid rgba(208,63,63,.18)}
        .field{display:grid;gap:6px;margin-bottom:14px}
        label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#6f6456;font-weight:700}
        input{border-radius:14px;border:1px solid rgba(24,22,15,.12);min-height:48px;padding:0 14px;font:inherit;color:#18160f;background:#fff}
        button,.link-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border-radius:999px;padding:0 18px;border:none;font-weight:700;text-decoration:none;cursor:pointer}
        button{background:linear-gradient(135deg,#c8922a,#e8aa35);color:#18160f;box-shadow:0 12px 24px rgba(200,146,42,.24);width:100%}
        .footer-links{margin-top:16px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
        .link-btn{background:rgba(24,22,15,.05);color:#18160f;border:1px solid rgba(24,22,15,.08)}
    </style>
</head>
<body>
<main class="card">
    <span class="eyebrow"><i class="fa-solid fa-briefcase"></i> Placement TPO Access</span>
    <h1>Placement Login</h1>
    <p>Publish company drives, review applications, and manage student placement flow from the portal.</p>
    <div class="msg err" th:if="${errorLogin != null}" th:text="${errorLogin}">Invalid email or password!</div>
    <form method="post" th:action="@{/placement-login}">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" required>
        </div>
        <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login as TPO</button>
    </form>
    <div class="footer-links">
        <a class="link-btn" th:href="@{/}"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
        <a class="link-btn" th:href="@{/login}">General login</a>
    </div>
</main>
</body>
</html>
