<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="panel" id="panel-address" data-step-panel="address" th:fragment="addressPanel">
    <div class="panel-head">
        <div>
            <p class="panel-kicker">Step 2 of 9</p>
            <h2 class="panel-title">Address Details</h2>
        </div>
        <div class="panel-badge">Permanent and correspondence addresses</div>
    </div>

    <p class="notice-line">Fill only address fields here. No personal or academic fields belong on this step.</p>

    <div class="address-layout">
        <div class="address-card">
            <div class="section">
                <h3>Residence / Permanent Address</h3>
                <div class="grid-4">
                    <div class="field"><label>Residence House Number *</label><input type="text" name="permanentHouseNumber" th:value="${studentPermanentHouseNumber}" placeholder="Enter Residence House Number" required></div>
                    <div class="field full"><label>Residence Address *</label><textarea name="permanentAddress" th:text="${studentPermanentAddress}" placeholder="Enter Permanent Address" required></textarea></div>
                    <div class="field">
                        <label>Residence Country *</label>
                        <select name="permanentCountry" required>
                            <option value="">Please Select Country</option>
                            <option value="INDIA" th:selected="${studentPermanentCountry == 'INDIA'}">INDIA</option>
                            <option value="Other" th:selected="${studentPermanentCountry == 'Other'}">Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Residence State *</label>
                        <select name="permanentState" th:attr="data-selected-value=${studentPermanentState},data-original-selected-value=${studentPermanentState}" required>
                            <option value="">Please Select State</option>
                            <option th:each="state : ${indiaStates}" th:value="${state}" th:text="${state}" th:selected="${studentPermanentState == state}">State</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Residence District *</label>
                        <select name="permanentDistrict" th:attr="data-selected-value=${studentPermanentDistrict},data-original-selected-value=${studentPermanentDistrict}" required>
                            <option value="">Please Select District</option>
                            <option th:each="district : ${studentPermanentDistrictOptions}" th:value="${district}" th:text="${district}" th:selected="${studentPermanentDistrict == district}">District</option>
                        </select>
                    </div>
                    <div class="field"><label>Residence City *</label><input type="text" name="permanentCity" th:value="${studentPermanentCity}" placeholder="Enter Residence City" required></div>
                    <div class="field"><label>Residence PINCode *</label><input type="text" name="permanentPinCode" th:value="${studentPermanentPinCode}" placeholder="Enter Residence PINCode" required></div>
                </div>
            </div>
        </div>

        <div class="address-card">
            <div class="section">
                <h3>Correspondence / Local Address</h3>
                <div class="field">
                    <label>
                        <input class="inline-check" type="checkbox" name="sameAsPermanent" data-same-address>
                        Same as Permanent Address
                    </label>
                </div>
                <div class="grid-4">
                    <div class="field"><label>Corresponding House Number *</label><input type="text" name="currentHouseNumber" th:value="${studentCurrentHouseNumber}" placeholder="Enter Corresponding House Number" required></div>
                    <div class="field full"><label>Corresponding Address *</label><textarea name="currentAddress" th:text="${studentCurrentAddress}" placeholder="Enter Temporary Address" required></textarea></div>
                    <div class="field">
                        <label>Corresponding Country *</label>
                        <select name="currentCountry" required>
                            <option value="">Please Select Country</option>
                            <option value="INDIA" th:selected="${studentCurrentCountry == 'INDIA'}">INDIA</option>
                            <option value="Other" th:selected="${studentCurrentCountry == 'Other'}">Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Corresponding State *</label>
                        <select name="currentState" th:attr="data-selected-value=${studentCurrentState},data-original-selected-value=${studentCurrentState}" required>
                            <option value="">Please Select State</option>
                            <option th:each="state : ${indiaStates}" th:value="${state}" th:text="${state}" th:selected="${studentCurrentState == state}">State</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Corresponding District *</label>
                        <select name="currentDistrict" th:attr="data-selected-value=${studentCurrentDistrict},data-original-selected-value=${studentCurrentDistrict}" required>
                            <option value="">Please Select District</option>
                            <option th:each="district : ${studentCurrentDistrictOptions}" th:value="${district}" th:text="${district}" th:selected="${studentCurrentDistrict == district}">District</option>
                        </select>
                    </div>
                    <div class="field"><label>Corresponding City *</label><input type="text" name="currentCity" th:value="${studentCurrentCity}" placeholder="Enter Corresponding City" required></div>
                    <div class="field"><label>Corresponding PINCode *</label><input type="text" name="currentPinCode" th:value="${studentCurrentPinCode}" placeholder="Enter Corresponding PINCode" required></div>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button type="button" class="btn btn-prev" data-step-prev>Back</button>
        <button type="button" class="btn btn-next" data-step-next>Save & Next</button>
    </div>
</section>
</body>
</html>
