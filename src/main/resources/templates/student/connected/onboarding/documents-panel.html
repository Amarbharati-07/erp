<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="panel" id="panel-documents" data-step-panel="documents" th:fragment="documentsPanel">
    <div class="panel-head">
        <div>
            <p class="panel-kicker">Step 4 of 9</p>
            <h2 class="panel-title">Photo and Signature</h2>
        </div>
        <div class="panel-badge">Only upload assets here</div>
    </div>

    <div class="upload-stage">
        <div class="upload-card">
            <h4>Photo *</h4>
            <label class="upload-button" for="photoInput">Upload Photo</label>
            <input id="photoInput" type="file" name="photo" accept="image/*" style="display:none">
            <div class="upload-drop">
                <div class="upload-preview" id="photoPreview">
                    <img th:if="${studentPhoto != null and studentPhoto != ''}" th:src="${studentPhoto}" alt="Student photo">
                    <div th:unless="${studentPhoto != null and studentPhoto != ''}" class="upload-placeholder">Preview photo</div>
                </div>
            </div>
            <div class="upload-note">Please select a valid image file. Max size 500 kb.</div>
        </div>

        <div class="upload-card">
            <h4>Signature *</h4>
            <label class="upload-button" for="signatureInput">Upload Sign</label>
            <input id="signatureInput" type="file" name="signature" accept="image/*" style="display:none">
            <div class="upload-drop">
                <div class="upload-preview" id="signaturePreview">
                    <img th:if="${studentSignature != null and studentSignature != ''}" th:src="${studentSignature}" alt="Student signature">
                    <div th:unless="${studentSignature != null and studentSignature != ''}" class="upload-placeholder">Preview signature</div>
                </div>
            </div>
            <div class="upload-note">Please select a valid image file. Max size 300 kb.</div>
        </div>
    </div>

    <div class="actions">
        <button type="button" class="btn btn-prev" data-step-prev>Back</button>
        <button type="button" class="btn btn-next" data-step-next>Save & Next</button>
    </div>
</section>
</body>
</html>
