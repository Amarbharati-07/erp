<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="panel" id="panel-last-qualifying" data-step-panel="last-qualifying" th:fragment="lastQualifyingPanel" style="background:#fff;padding:0 0 14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 10px;border-bottom:1px solid #e5e7eb;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h2 style="margin:0;font-size:12px;font-weight:700;color:#222;">Last Qualifying Exam Details</h2>
            <span style="color:#1631f3;font-size:12px;font-weight:700;">Application No:- <span th:text="${student.registrationNo != null ? student.registrationNo : 'N/A'}">N/A</span></span>
        </div>
        <div style="width:26px;height:26px;border-radius:3px;background:#25b04a;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;line-height:1;">▶</div>
    </div>

    <div style="display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);gap:16px;align-items:start;margin-top:10px;">
        <div>
            <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 14px;">
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Last Exam Name<span style="color:#ff0000;">*</span></label>
                    <select name="lastQualifyingExamName" data-lastq-field="examName" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                        <option value="">Please Select</option>
                        <option value="GRADUATION" th:selected="${student.lastQualifyingExamName == 'GRADUATION'}">GRADUATION</option>
                        <option value="HSC/DIPLOMA" th:selected="${student.lastQualifyingExamName == 'HSC/DIPLOMA'}">HSC/DIPLOMA</option>
                        <option value="SSC" th:selected="${student.lastQualifyingExamName == 'SSC'}">SSC</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Obtained Marks<span style="color:#ff0000;">*</span></label>
                    <input type="number" min="0" step="0.01" name="obtainedMarks" data-lastq-field="obtainedMarks" th:value="${student.obtainedMarks}" placeholder="Enter Obtained Marks" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Board/University<span style="color:#ff0000;">*</span></label>
                    <select name="boardUniversity" data-lastq-field="boardUniversity" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                        <option value="">Please Select</option>
                        <option value="University" th:selected="${student.boardUniversity == 'University'}">University</option>
                        <option value="Board" th:selected="${student.boardUniversity == 'Board'}">Board</option>
                        <option value="Other" th:selected="${student.boardUniversity == 'Other'}">Other</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Total Marks<span style="color:#ff0000;">*</span></label>
                    <input type="number" min="0" step="0.01" name="totalMarks" data-lastq-field="totalMarks" th:value="${student.totalMarks}" placeholder="Enter Total Marks" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">School/College<span style="color:#ff0000;">*</span></label>
                    <input type="text" name="schoolCollege" data-lastq-field="schoolCollege" th:value="${student.schoolCollege}" placeholder="Enter School/College" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Percentage</label>
                    <div style="display:flex;align-items:center;">
                        <input type="text" name="percentage" data-lastq-field="percentage" th:value="${student.percentage}" readonly style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px 0 0 2px;outline:none;">
                        <span style="height:25px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #c7d0da;border-left:0;background:#eaf1fb;padding:0 7px;font-size:12px;font-weight:700;color:#1f2937;">%</span>
                    </div>
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Place<span style="color:#ff0000;">*</span></label>
                    <input type="text" name="lastExamPlace" th:value="${student.birthPlace}" placeholder="mumbai" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Passing Year<span style="color:#ff0000;">*</span></label>
                    <input type="text" name="passingYear" data-lastq-field="passingYear" th:value="${student.passingYear}" placeholder="Enter Passing Year" required inputmode="numeric" maxlength="4" style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Last Exam Roll Number<span style="color:#ff0000;">*</span></label>
                    <input type="text" name="lastExamRollNo" th:value="${student.rollNo}" placeholder="Enter Last Exam Roll Number" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Stream<span style="color:#ff0000;">*</span></label>
                    <select name="stream" data-lastq-field="stream" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                        <option value="">Please Select</option>
                        <option value="ARTS" th:selected="${student.stream == 'ARTS'}">ARTS</option>
                        <option value="COMMERCE" th:selected="${student.stream == 'COMMERCE'}">COMMERCE</option>
                        <option value="SCIENCE" th:selected="${student.stream == 'SCIENCE'}">SCIENCE</option>
                        <option value="OTHER" th:selected="${student.stream == 'OTHER'}">OTHER</option>
                    </select>
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">University Pre Adm Reg No.<span style="color:#ff0000;">*</span></label>
                    <input type="text" name="universityPreAdmRegNo" th:value="${student.universityPreAdmRegNo}" placeholder="987909879878978978" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                </div>
                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Education Gap<span style="color:#ff0000;">*</span></label>
                    <div style="height:25px;display:flex;align-items:center;gap:20px;padding-top:2px;font-size:12px;color:#334155;">
                        <label style="display:flex;align-items:center;gap:4px;"><input type="radio" name="educationGap" value="Yes" required th:checked="${student.educationGap != null and student.educationGap}"> Yes</label>
                        <label style="display:flex;align-items:center;gap:4px;"><input type="radio" name="educationGap" value="No" th:checked="${student.educationGap == null or !student.educationGap}"> No</label>
                    </div>
                </div>

                <div>
                    <label style="display:block;margin:0 0 4px;font-size:11px;font-weight:700;color:#1f2937;">Passing Month<span style="color:#ff0000;">*</span></label>
                    <select name="passingMonth" data-lastq-field="passingMonth" required style="width:100%;height:25px;padding:2px 10px;border:1px solid #c7d0da;background:#eaf1fb;font-size:12px;color:#334155;border-radius:2px;outline:none;">
                        <option value="">Please Select</option>
                        <option value="January" th:selected="${student.passingMonth == 'January'}">January</option>
                        <option value="February" th:selected="${student.passingMonth == 'February'}">February</option>
                        <option value="March" th:selected="${student.passingMonth == 'March'}">March</option>
                        <option value="April" th:selected="${student.passingMonth == 'April'}">April</option>
                        <option value="May" th:selected="${student.passingMonth == 'May'}">May</option>
                        <option value="June" th:selected="${student.passingMonth == 'June'}">June</option>
                        <option value="July" th:selected="${student.passingMonth == 'July'}">July</option>
                        <option value="August" th:selected="${student.passingMonth == 'August'}">August</option>
                        <option value="September" th:selected="${student.passingMonth == 'September'}">September</option>
                        <option value="October" th:selected="${student.passingMonth == 'October'}">October</option>
                        <option value="November" th:selected="${student.passingMonth == 'November'}">November</option>
                        <option value="December" th:selected="${student.passingMonth == 'December'}">December</option>
                    </select>
                </div>
            </div>
        </div>

        <div style="border-left:1px solid #e5e7eb;padding-left:16px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <span style="width:18px;height:18px;border:1px solid #cbd5e1;border-radius:2px;color:#94a3b8;display:grid;place-items:center;font-size:10px;">☰</span>
                <h3 style="margin:0;font-size:12px;font-weight:700;color:#334155;">Last Qualifying Subject Details</h3>
            </div>
            <div style="color:#ff1616;font-size:12px;line-height:1.35;margin:6px 0 10px;">Note: Do not enter marks for not applicable subject.</div>
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
                <thead>
                <tr>
                    <th style="padding:7px 8px;border:1px solid #e2e8f0;border-left:0;text-align:left;color:#334155;font-weight:700;">Subject</th>
                    <th style="padding:7px 8px;border:1px solid #e2e8f0;text-align:center;color:#334155;font-weight:700;">Obt. Marks</th>
                    <th style="padding:7px 8px;border:1px solid #e2e8f0;text-align:center;color:#334155;font-weight:700;">Total Marks</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td style="height:34px;border:1px solid #e2e8f0;border-left:0;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                </tr>
                <tr>
                    <td style="height:34px;border:1px solid #e2e8f0;border-left:0;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                </tr>
                <tr>
                    <td style="height:34px;border:1px solid #e2e8f0;border-left:0;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                    <td style="border:1px solid #e2e8f0;text-align:center;"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="actions" style="justify-content:flex-end;margin-top:14px;">
        <button type="button" class="btn btn-prev" data-step-prev>Back</button>
        <button type="button" class="btn btn-next" data-step-next>Save & Next</button>
    </div>
</section>
</body>
</html>
