<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="panel" id="panel-education" data-step-panel="education" th:fragment="educationPanel">
    <div class="panel-head">
        <div>
            <p class="panel-kicker">Step 3 of 9</p>
            <h2 class="panel-title">Education Details</h2>
        </div>
        <div class="panel-badge">Qualification entry and history</div>
    </div>

    <p class="notice-line">Note: Kindly enter your board name in front of Board/University</p>

    <div class="education-workbench" data-education-workbench>
        <div class="education-entry">
            <div class="section">
                <h3>Add Qualification</h3>
                <div class="grid-4">
                    <div class="field">
                        <label for="eduExamLevel">Exam Level *</label>
                        <select id="eduExamLevel" name="lastQualifyingExamName" data-education-field="lastQualifyingExamName" required>
                            <option value="">Please Select</option>
                            <option value="SSC" th:selected="${student.lastQualifyingExamName == 'SSC'}">SSC</option>
                            <option value="HSC/DIPLOMA" th:selected="${student.lastQualifyingExamName == 'HSC/DIPLOMA'}">HSC/DIPLOMA</option>
                            <option value="GRADUATION" th:selected="${student.lastQualifyingExamName == 'GRADUATION'}">GRADUATION</option>
                            <option value="POST GRADUATION" th:selected="${student.lastQualifyingExamName == 'POST GRADUATION'}">POST GRADUATION</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="eduExamName">Name Of Exam *</label>
                        <input id="eduExamName" type="text" name="examName" data-education-field="examName" placeholder="Ex. HSC/SSC/UG/PG" required>
                    </div>
                    <div class="field">
                        <label for="eduBoard">Name Of Board *</label>
                        <select id="eduBoard" name="boardUniversity" data-education-field="boardUniversity" required>
                            <option value="">Please Select</option>
                            <option value="Board" th:selected="${student.boardUniversity == 'Board'}">Board</option>
                            <option value="University" th:selected="${student.boardUniversity == 'University'}">University</option>
                            <option value="Other" th:selected="${student.boardUniversity == 'Other'}">Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="eduInstitute">Institute Name *</label>
                        <input id="eduInstitute" type="text" name="schoolCollege" data-education-field="schoolCollege" placeholder="Enter Institute Name" th:value="${student.schoolCollege}" required>
                    </div>

                    <div class="field">
                        <label for="eduPassingDate">Date Of Passing *</label>
                        <input id="eduPassingDate" type="date" name="dateOfPassing" data-education-field="dateOfPassing" th:value="${student.dateOfPassing != null ? #temporals.format(student.dateOfPassing, 'yyyy-MM-dd') : ''}" required>
                    </div>
                    <div class="field">
                        <label for="eduResult">Result *</label>
                        <select id="eduResult" name="result" data-education-field="result" required>
                            <option value="">Please Select</option>
                            <option value="Pass" th:selected="${student.result == 'Pass'}">Pass</option>
                            <option value="Fail" th:selected="${student.result == 'Fail'}">Fail</option>
                            <option value="Appearing" th:selected="${student.result == 'Appearing'}">Appearing</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="eduYear">Year *</label>
                        <input id="eduYear" type="text" name="passingYear" data-education-field="passingYear" inputmode="numeric" maxlength="4" placeholder="Enter Year" th:value="${student.passingYear}" required>
                    </div>
                    <div class="field">
                        <label for="eduSeatNo">Exam Seat No *</label>
                        <input id="eduSeatNo" type="text" name="examSeatNo" data-education-field="examSeatNo" placeholder="Enter Exam Seat No." th:value="${student.examSeatNo}" required>
                    </div>

                    <div class="field">
                        <label for="eduObtained">Obtained Marks *</label>
                        <input id="eduObtained" type="number" min="0" step="0.01" name="obtainedMarks" data-education-field="obtainedMarks" placeholder="Enter Obtained Marks" th:value="${student.obtainedMarks}" required>
                    </div>
                    <div class="field">
                        <label for="eduMax">Max Marks *</label>
                        <input id="eduMax" type="number" min="0" step="0.01" name="totalMarks" data-education-field="totalMarks" placeholder="Enter Max Marks" th:value="${student.totalMarks}" required>
                    </div>
                    <div class="field">
                        <label for="eduPercentage">Percentage *</label>
                        <input id="eduPercentage" type="text" name="percentage" data-education-field="percentage" placeholder="Enter Percentage" th:value="${student.percentage}" readonly required>
                    </div>
                    <div class="field">
                        <label for="eduMonth">Passing Month *</label>
                        <select id="eduMonth" name="passingMonth" data-education-field="passingMonth" required>
                            <option value="">Please Select</option>
                            <option value="January" th:selected="${student.passingMonth == 'January'}">January</option>
                            <option value="February" th:selected="${student.passingMonth == 'February'}">February</option>
                            <option value="March" th:selected="${student.passingMonth == 'March'}">March</option>
                            <option value="April" th:selected="${student.passingMonth == 'April'}">April</option>
                            <option value="May" th:selected="${student.passingMonth == 'May'}">May</option>
                            <option value="June" th:selected="${student.passingMonth == 'June'}">June</option>
                            <option value="July" th:selected="${student.passingMonth == 'July'}">July</option>
                            <option value="August" th:selected="${student.passingMonth == 'August'}">August</option>
                            <option value="September" th:selected="${student.passingMonth == 'September'}">September</option>
                            <option value="October" th:selected="${student.passingMonth == 'October'}">October</option>
                            <option value="November" th:selected="${student.passingMonth == 'November'}">November</option>
                            <option value="December" th:selected="${student.passingMonth == 'December'}">December</option>
                        </select>
                    </div>
                </div>

                <div class="actions" style="justify-content:center;margin-top:12px">
                    <button type="button" class="btn btn-add" data-education-add>Add</button>
                </div>
            </div>
        </div>

        <div class="education-history">
            <div class="section">
                <h3>Qualification History</h3>
                <table class="education-table">
                    <thead>
                    <tr>
                        <th>Exam Level</th>
                        <th>Name of Exam</th>
                        <th>Total Marks</th>
                        <th>Obt. Marks</th>
                        <th>%</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody data-education-history>
                    <tr data-empty-row>
                        <td colspan="6" style="text-align:center;color:#8a97ab;padding:16px 8px">No qualification added yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="actions">
        <button type="button" class="btn btn-prev" data-step-prev>Back</button>
        <button type="button" class="btn btn-next" data-step-next>Save & Next</button>
    </div>
</section>
</body>
</html>
