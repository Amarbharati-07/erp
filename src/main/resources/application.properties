# Server
server.port=8082

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/scms
spring.datasource.username=root
spring.datasource.password=Amar07@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Placement and other multipart uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Field encryption secret for Aadhaar, PAN, bank details, and similar sensitive values.
# Set FIELD_ENCRYPTION_SECRET in your environment for production.
app.security.field-encryption-secret=${FIELD_ENCRYPTION_SECRET:SCMS_DEV_ONLY_CHANGE_THIS_SECRET_BEFORE_PRODUCTION}

# Thymeleaf cache off for live reload
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:${user.dir}/src/main/resources/templates/
spring.thymeleaf.suffix=.html

# Serve static assets directly from source during local development
spring.web.resources.static-locations=file:${user.dir}/src/main/resources/static/,classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# DevTools ? auto restart
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/templates,src/main/resources/static
